<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostCart – Save Money Automatically</title>
  <style>
    body {
      background: #0b0b0f;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 20px;
    }
    .card {
      background: #111; border: 1px solid #1e1e28; border-radius: 24px;
      padding: 40px 30px; text-align: center; max-width: 420px; width: 100%;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }
    h1 { font-size: 28px; margin-bottom: 12px; }
    .gradient-text {
      background: linear-gradient(90deg, #0ff, #8a2be2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    p { color: #aaa; margin-bottom: 24px; line-height: 1.5; }
    .btn {
      display: inline-block; padding: 14px 36px; border-radius: 30px;
      font-weight: 700; text-decoration: none;
      background: linear-gradient(135deg, #0ff, #8a2be2);
      color: #000; box-shadow: 0 0 20px rgba(0,255,255,0.5);
      transition: all 0.2s; border: none; cursor: pointer; font-size: 16px;
    }
    .btn:hover { box-shadow: 0 0 35px rgba(0,255,255,0.9); transform: scale(1.03); }
    .small { font-size: 12px; color: #666; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="gradient-text">👻 GhostCart</span></h1>
    <p id="message">Save money while you shop. GhostCart compares prices across Amazon, eBay, and Walmart — automatically.</p>
    <a class="btn" href="https://chrome.google.com/webstore/detail/ghostcart/PLACEHOLDER" target="_blank" id="installBtn">
      Install GhostCart
    </a>
    <p class="small">After installing, come back here or simply open Chrome — your friend will get premium automatically.</p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const ref = params.get('ref');
    if (ref) {
      // Save the referral code as a cookie (30 days)
      document.cookie = `ghostcart_ref=${ref}; path=/; max-age=2592000; SameSite=Lax`;
      document.getElementById('message').textContent = 'You’ve got a referral! Install GhostCart and you’ll both unlock premium.';
    }
  </script>
</body>
</html>
